# AI-relevant file hidden-content scan fixtures (item 19, AI-file half).
#
# These exercise the `aifile` rule module: Jupyter notebooks (.ipynb), AI
# agent-instruction files (CLAUDE.md / AGENTS.md / .cursorrules), and SVG
# images. Every fixture is a `file`-context scan — the module selects checks
# by file_path.
#
# For each rule there is at least one attack fixture (block/warn) AND at
# least one benign fixture (allow) proving a legitimate file stays clean.
# False positives are the main risk: a normal .ipynb, an ordinary CLAUDE.md
# with visible instructions, and a normal SVG image must NOT fire.

# ── Jupyter notebook: invisible characters in cell source ───────────────

[[fixture]]
name = "notebook_zero_width_in_markdown_cell"
min_milestone = 3
# A zero-width space (U+200B) hidden inside a markdown cell's source.
input = "{\"cells\":[{\"cell_type\":\"markdown\",\"source\":[\"Please review​ this carefully\"]}]}"
context = "file"
file_path = "analysis.ipynb"
expected_action = "block"
expected_rules = ["notebook_hidden_content"]

[[fixture]]
name = "notebook_bidi_override_in_code_cell"
min_milestone = 3
# A right-to-left override (U+202E) inside a code cell's source.
input = "{\"cells\":[{\"cell_type\":\"code\",\"source\":\"x = 1  # ‮safe comment\"}]}"
context = "file"
file_path = "model.ipynb"
expected_action = "block"
expected_rules = ["notebook_hidden_content"]

# ── Jupyter notebook: base64 blob embedded in cell source ───────────────

[[fixture]]
name = "notebook_base64_blob_in_source"
min_milestone = 3
# A long base64 run (decodes to "this is a hidden payload smuggled into a
# notebook cell source field — long enough to be a real blob").
input = "{\"cells\":[{\"cell_type\":\"code\",\"source\":\"payload = 'dGhpcyBpcyBhIGhpZGRlbiBwYXlsb2FkIHNtdWdnbGVkIGludG8gYSBub3RlYm9vayBjZWxsIHNvdXJjZSBmaWVsZCAtLSBsb25nIGVub3VnaCB0byBiZSBhIHJlYWwgYmxvYg=='\"}]}"
context = "file"
file_path = "notebook.ipynb"
expected_action = "warn"
expected_rules = ["notebook_hidden_content"]

