# CI / repo supply-chain scan fixtures (item 22).
#
# These exercise the `cifile` rule module: GitHub Actions workflows,
# Dockerfiles, Terraform configs, Helm chart files, and package.json
# lifecycle scripts. Every fixture is a `file`-context scan — the module
# selects checks by file_path.
#
# For each rule there is at least one attack fixture (block/warn) AND at
# least one benign fixture (allow) proving a legitimate file stays clean.

# ── GitHub Actions: unpinned action ─────────────────────────────────────

[[fixture]]
name = "workflow_action_pinned_to_tag"
min_milestone = 3
input = "name: CI\non: [push]\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n"
context = "file"
file_path = ".github/workflows/ci.yml"
expected_action = "warn"
expected_rules = ["workflow_unpinned_action"]

[[fixture]]
name = "workflow_action_pinned_to_branch"
min_milestone = 3
input = "name: CI\non: [push]\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: some-org/some-action@main\n"
context = "file"
file_path = ".github/workflows/release.yaml"
expected_action = "warn"
expected_rules = ["workflow_unpinned_action"]

[[fixture]]
name = "workflow_action_sha_pinned_clean"
min_milestone = 3
input = "name: CI\non: [push]\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608\n      - run: npm ci && npm test\n"
context = "file"
file_path = ".github/workflows/ci.yml"
expected_action = "allow"
expected_rules = []

[[fixture]]
name = "workflow_local_action_clean"
min_milestone = 3
input = "name: CI\non: [push]\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: ./.github/actions/setup-env\n      - run: make build\n"
context = "file"
file_path = ".github/workflows/ci.yml"
expected_action = "allow"
expected_rules = []

