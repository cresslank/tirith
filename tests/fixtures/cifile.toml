context = "file"
file_path = "Chart.yaml"
expected_action = "warn"
expected_rules = ["helm_untrusted_repo"]

[[fixture]]
name = "helm_chart_trusted_dependency_repo_clean"
min_milestone = 3
input = "apiVersion: v2\nname: myapp\nversion: 1.0.0\ndependencies:\n  - name: redis\n    version: 17.0.0\n    repository: https://charts.bitnami.com/bitnami\n"
context = "file"
file_path = "Chart.yaml"
expected_action = "allow"
expected_rules = []

[[fixture]]
# An OCI-registry chart dependency from an untrusted host. Helm 3 supports
# `oci://` dependency repositories; an untrusted OCI host is the same
# remote-pull risk as an untrusted https chart repo.
name = "helm_chart_untrusted_oci_dependency_repo"
min_milestone = 3
input = "apiVersion: v2\nname: myapp\nversion: 1.0.0\ndependencies:\n  - name: redis\n    version: 17.0.0\n    repository: oci://registry.evil.example.com/charts\n"
context = "file"
file_path = "Chart.yaml"
expected_action = "warn"
expected_rules = ["helm_untrusted_repo"]

[[fixture]]
# An OCI-registry chart dependency from a recognised host (ghcr.io is in the
# trusted-host set) — must stay clean.
name = "helm_chart_trusted_oci_dependency_repo_clean"
min_milestone = 3
input = "apiVersion: v2\nname: myapp\nversion: 1.0.0\ndependencies:\n  - name: redis\n    version: 17.0.0\n    repository: oci://ghcr.io/example-org/charts\n"
context = "file"
file_path = "Chart.yaml"
expected_action = "allow"
expected_rules = []

