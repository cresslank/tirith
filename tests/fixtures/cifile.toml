[[fixture]]
# Multi-stage build: two distinct external base images, both on a mutable tag
# (a build stage on `:latest`, a runtime stage with no tag at all). The two
# un-pinned FROM lines fold into a single dockerfile_unpinned_image finding —
# the `FROM builder` stage reference is internal and must not add a third.
name = "dockerfile_multi_from_two_unpinned_folded"
min_milestone = 3
input = "FROM golang:latest AS builder\nWORKDIR /src\nRUN go build -o app .\nFROM debian\nCOPY --from=builder /src/app /app\nCMD [\"/app\"]\n"
context = "file"
file_path = "Dockerfile"
expected_action = "warn"
expected_rules = ["dockerfile_unpinned_image"]

