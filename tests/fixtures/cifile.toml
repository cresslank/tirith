[[fixture]]
name = "dockerfile_version_tag_clean"
min_milestone = 3
input = "FROM node:20.11.1\nWORKDIR /app\nCMD [\"node\", \"index.js\"]\n"
context = "file"
file_path = "Dockerfile"
expected_action = "allow"
